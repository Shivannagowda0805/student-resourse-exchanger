<section class="hero-section section-lg">
    <div class="container">
        <div class="hero-content">
            <h1>Find, Exchange, or Sell Student Resources</h1>
            <p class="hero-description">A trusted campus marketplace for affordable, verified student deals.</p>
            <form class="hero-search-form" method="get" action="{% url 'resource_list' %}">
                <input type="text" name="q" placeholder="Search by Subject, Book, or Course Code" aria-label="Search resources" required>
                <button type="submit" class="btn btn-primary">Search</button>
            </form>
            <div class="hero-buttons">
                <a href="{% url 'resource_list' %}" class="btn btn-secondary">Start Learning</a>
                {% if not user.is_authenticated %}
                    <a href="{% url 'login' %}" class="btn btn-outline">Sign In</a>
                {% endif %}
            </div>
        </div>
        <div class="hero-visual">
            <!-- Optimized: Placeholder for illustration or featured resources -->
        </div>
    </div>
</section>
