<section id="notes-section" class="notes-section section">
    <div class="container">
        <div class="section-header">
            <h2 class="section-title">Study Notes</h2>
            <button class="btn btn-primary" id="upload-notes-btn">Upload Notes</button>
        </div>

        <div class="search-filter-container">
            <div class="search-bar">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" id="notes-search" class="search-input" placeholder="Search notes by title, subject, department..." aria-label="Search notes">
            </div>
            <div class="filters">
                <select id="notes-department-filter" class="form-select">
                    <option value="">All Departments</option>
                    <option value="cse">Computer Science</option>
                    <option value="ise">Information Science</option>
                    <option value="ece">Electronics & Communication</option>
                    <option value="eee">Electrical & Electronics</option>
                    <option value="mechanical">Mechanical</option>
                    <option value="civil">Civil</option>
                    <option value="other">Other</option>
                </select>
                <select id="notes-semester-filter" class="form-select">
                    <option value="">All Semesters</option>
                    <option value="1">Semester 1</option>
                    <option value="2">Semester 2</option>
                    <option value="3">Semester 3</option>
                    <option value="4">Semester 4</option>
                    <option value="5">Semester 5</option>
                    <option value="6">Semester 6</option>
                    <option value="7">Semester 7</option>
                    <option value="8">Semester 8</option>
                </select>
            </div>
        </div>

        <div id="notes-grid" class="resource-grid">
            <!-- Notes will be populated by JavaScript -->
        </div>

        <div id="notes-empty-state" class="empty-state" style="display: none;">
            <span class="empty-state-icon">📝</span>
            <h3 class="empty-state-title">No notes found</h3>
            <p class="empty-state-description">Be the first to upload notes for your department!</p>
        </div>
    </div>
</section>

<!-- Upload Notes Modal -->
<div id="upload-notes-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Upload Study Notes</h3>
            <button class="modal-close">&times;</button>
        </div>
        <form id="upload-notes-form" class="upload-form">
            <div class="form-group">
                <label for="notes-title" class="form-label">Title *</label>
                <input type="text" id="notes-title" class="form-input" required>
            </div>
            <div class="form-group">
                <label for="notes-subject" class="form-label">Subject *</label>
                <input type="text" id="notes-subject" class="form-input" required>
            </div>
            <div class="form-group">
                <label for="notes-department" class="form-label">Department *</label>
                <select id="notes-department" class="form-select" required>
                    <option value="">Select Department</option>
                    <option value="cse">Computer Science</option>
                    <option value="ise">Information Science</option>
                    <option value="ece">Electronics & Communication</option>
                    <option value="eee">Electrical & Electronics</option>
                    <option value="mechanical">Mechanical</option>
                    <option value="civil">Civil</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="notes-semester" class="form-label">Semester *</label>
                <select id="notes-semester" class="form-select" required>
                    <option value="">Select Semester</option>
                    <option value="1">Semester 1</option>
                    <option value="2">Semester 2</option>
                    <option value="3">Semester 3</option>
                    <option value="4">Semester 4</option>
                    <option value="5">Semester 5</option>
                    <option value="6">Semester 6</option>
                    <option value="7">Semester 7</option>
                    <option value="8">Semester 8</option>
                </select>
            </div>
            <div class="form-group">
                <label for="notes-file" class="form-label">Upload File *</label>
                <div class="file-upload-area" id="notes-file-upload">
                    <div class="file-upload-content">
                        <span class="upload-icon">📎</span>
                        <p>Drag & drop your file here or <span class="upload-link">browse</span></p>
                        <input type="file" id="notes-file" accept=".pdf,.doc,.docx,.txt" style="display: none;">
                    </div>
                </div>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary modal-close">Cancel</button>
                <button type="submit" class="btn btn-primary">Upload Notes</button>
            </div>
        </form>
    </div>
</div></content>
