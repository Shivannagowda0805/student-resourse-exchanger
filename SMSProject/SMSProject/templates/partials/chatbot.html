<!-- Chatbot Widget -->
<div id="chatbot-widget" class="chatbot-widget">
    <div class="chatbot-toggle" id="chatbot-toggle">
        <span class="chatbot-icon">💬</span>
    </div>
    <div class="chatbot-container" id="chatbot-container" style="display: none;">
        <div class="chatbot-header">
            <h4>Study Assistant</h4>
            <button class="chatbot-close" id="chatbot-close">&times;</button>
        </div>
        <div class="chatbot-messages" id="chatbot-messages">
            <div class="message bot-message">
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <p>Hi! I'm your study assistant. How can I help you today?</p>
                </div>
            </div>
        </div>
        <div class="chatbot-input-area">
            <input type="text" id="chatbot-input" placeholder="Ask me about notes, question papers, or textbooks..." class="chatbot-input">
            <button id="chatbot-send" class="chatbot-send-btn">Send</button>
        </div>
    </div>
</div></content>
